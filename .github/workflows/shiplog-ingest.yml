# =============================================================================
# Shiplog ingest — fires on every merge to `staging` or `main`.
#
# This file is the CANONICAL template. The same file is committed verbatim
# into each AIFT repo's .github/workflows/ directory:
#   - aift-db/.github/workflows/shiplog-ingest.yml
#   - aift-api/.github/workflows/shiplog-ingest.yml
#   - aift-web/.github/workflows/shiplog-ingest.yml
#   - aift-ops/.github/workflows/shiplog-ingest.yml
#   - aift-help/.github/workflows/shiplog-ingest.yml
#
# Sync changes by editing this template, then running:
#   aift-ops/scripts/sync-shiplog-workflow.sh
#
# Per-repo prerequisites (set once when shiplog goes live):
#   - vars.SHIPLOG_INGEST_URL  — the shiplog-ingest Edge Function URL
#                                (e.g. https://<project-ref>.supabase.co/functions/v1/shiplog-ingest)
#   - secrets.SHIPLOG_INGEST_HMAC  — shared HMAC-SHA256 secret; must match
#                                    the `shiplog_ingest_hmac_secret` Vault
#                                    entry in the host Supabase project.
#   - secrets.SHIPLOG_SUPABASE_ANON_KEY  — the host project's anon JWT, used
#                                          for the function's Authorization
#                                          header (the function does its own
#                                          HMAC check on top).
#
# The workflow is INERT until SHIPLOG_INGEST_URL is set as a repo variable
# (see the `if:` gate on the job). Safe to merge in advance.
#
# PRD: aift-ops/specs/shiplog-internal-digest.md §6, §10
# =============================================================================

name: Shiplog ingest

on:
  push:
    branches: [staging, main]

jobs:
  ingest:
    name: Post merge to shiplog
    runs-on: ubuntu-latest
    # Inert until SHIPLOG_INGEST_URL is configured as a repo variable.
    if: ${{ vars.SHIPLOG_INGEST_URL != '' }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect PR metadata + bounded diff
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          MERGE_SHA: ${{ github.sha }}
          BRANCH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # The PR that produced this merge commit on the target branch.
          # Falls back to empty fields for direct pushes (rare on AIFT).
          PR_JSON=$(gh pr list --search "$MERGE_SHA" --state merged --json number,title,body,url,author --jq '.[0] // {}')

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // empty')
          PR_BODY=$(echo "$PR_JSON" | jq -r '.body // empty')
          PR_URL=$(echo "$PR_JSON" | jq -r '.url // empty')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login // empty')

          # Direct-push fallback for title/author so the ingest still records something useful.
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=%s)
          fi
          if [ -z "$AUTHOR" ]; then
            AUTHOR=$(git log -1 --pretty=%an)
          fi

          # Diff stats: --shortstat gives us files/additions/deletions in one line.
          SHORTSTAT=$(git diff --shortstat "$MERGE_SHA~1" "$MERGE_SHA" || true)
          FILES_CHANGED=$(echo "$SHORTSTAT" | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo "0")
          ADDITIONS=$(echo "$SHORTSTAT" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(echo "$SHORTSTAT" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")

          # Full diff (capped). The shiplog-ingest function further caps at 30 KB, but
          # capping locally first avoids paying for a giant HTTP body that gets sliced
          # server-side. Anything above the cap → diff_truncated=true, and the prompt
          # falls back to title + body + file list.
          DIFF_MAX_BYTES=30000
          DIFF_FULL=$(git diff "$MERGE_SHA~1" "$MERGE_SHA")
          DIFF_BYTES=$(echo -n "$DIFF_FULL" | wc -c | tr -d ' ')
          if [ "$DIFF_BYTES" -gt "$DIFF_MAX_BYTES" ]; then
            DIFF_HEAD=$(echo "$DIFF_FULL" | head -c "$DIFF_MAX_BYTES")
            FILES_LIST=$(git diff --name-status "$MERGE_SHA~1" "$MERGE_SHA")
            DIFF_EXCERPT=$(printf '%s\n\n[diff truncated at %s bytes -- files in this merge:]\n%s' "$DIFF_HEAD" "$DIFF_MAX_BYTES" "$FILES_LIST")
            DIFF_TRUNCATED=true
          else
            DIFF_EXCERPT="$DIFF_FULL"
            DIFF_TRUNCATED=false
          fi

          MERGED_AT=$(git log -1 --pretty=%cI "$MERGE_SHA")

          # Compose the JSON payload via jq to handle escaping safely.
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg branch "$BRANCH_REF" \
            --arg sha "$MERGE_SHA" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            --arg pr_url "$PR_URL" \
            --arg author "$AUTHOR" \
            --arg files_changed "$FILES_CHANGED" \
            --arg additions "$ADDITIONS" \
            --arg deletions "$DELETIONS" \
            --arg diff_excerpt "$DIFF_EXCERPT" \
            --arg diff_truncated "$DIFF_TRUNCATED" \
            --arg merged_at "$MERGED_AT" \
            '{
              repo: $repo,
              branch: $branch,
              merge_commit_sha: $sha,
              pr_number: ($pr_number | if . == "" then null else (try (tonumber) catch null) end),
              pr_title: $pr_title,
              pr_body: ($pr_body | if . == "" then null else . end),
              pr_url: ($pr_url | if . == "" then null else . end),
              author_login: ($author | if . == "" then null else . end),
              files_changed: ($files_changed | tonumber? // 0),
              additions: ($additions | tonumber? // 0),
              deletions: ($deletions | tonumber? // 0),
              diff_excerpt: $diff_excerpt,
              diff_truncated: ($diff_truncated == "true"),
              merged_at: $merged_at
            }')

          # Persist the payload to a file (avoids env-var size limits and quoting hell).
          echo "$PAYLOAD" > shiplog-payload.json

          echo "payload_path=shiplog-payload.json" >> "$GITHUB_OUTPUT"
          echo "Payload size: $(wc -c < shiplog-payload.json) bytes"

      - name: Sign and POST to shiplog-ingest
        env:
          SHIPLOG_INGEST_URL: ${{ vars.SHIPLOG_INGEST_URL }}
          SHIPLOG_INGEST_HMAC: ${{ secrets.SHIPLOG_INGEST_HMAC }}
          SHIPLOG_ANON_KEY: ${{ secrets.SHIPLOG_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SHIPLOG_INGEST_HMAC" ]; then
            echo "::warning::SHIPLOG_INGEST_HMAC secret not set — skipping post (workflow remains inert)."
            exit 0
          fi
          if [ -z "$SHIPLOG_ANON_KEY" ]; then
            echo "::warning::SHIPLOG_SUPABASE_ANON_KEY secret not set — skipping post (workflow remains inert)."
            exit 0
          fi

          # HMAC-SHA256 of the raw payload bytes. Must match the verification
          # inside shiplog-ingest. Header value format: 'sha256=<hex>'.
          SIGNATURE=$(openssl dgst -sha256 -hmac "$SHIPLOG_INGEST_HMAC" -hex < shiplog-payload.json | awk '{print $2}')

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$SHIPLOG_INGEST_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SHIPLOG_ANON_KEY" \
            -H "X-Shiplog-Signature: sha256=$SIGNATURE" \
            --data-binary @shiplog-payload.json)

          echo "shiplog-ingest HTTP $HTTP_CODE"
          cat response.json || true
          echo

          # 2xx — accepted or deduped. 4xx/5xx — fail the job so the operator notices.
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::shiplog-ingest returned $HTTP_CODE"
            exit 1
          fi
