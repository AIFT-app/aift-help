# Catalyst drift check
#
# aift-web is the source of truth for Catalyst UI components. aift-help mirrors
# a copy in src/components/catalyst/. This workflow enforces that they never
# diverge — any PR that introduces drift fails until the operator runs
# `aift-ops/scripts/sync-catalyst-to-help.sh` and re-pushes.
#
# Required repo secret: AIFT_WEB_READ_TOKEN
#   - Fine-grained PAT with "Contents: Read" access to AIFT-app/aift-web
#   - Without it, the workflow fails closed (intentional — silent skip would
#     defeat the gate)
#
# PRD: aift-ops/specs/adopt-catalyst-in-aift-help.md

name: catalyst-drift-check

on:
  pull_request:
    branches: [staging, main]
    paths:
      - 'src/components/catalyst/**'
      - 'src/hooks/useSidebarState.ts'
      - '.github/workflows/catalyst-drift-check.yml'
  push:
    branches: [staging, main]
    paths:
      - 'src/components/catalyst/**'
      - 'src/hooks/useSidebarState.ts'

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aift-help
        uses: actions/checkout@v4
        with:
          path: aift-help

      - name: Checkout aift-web (catalyst source of truth)
        uses: actions/checkout@v4
        with:
          repository: AIFT-app/aift-web
          ref: main
          token: ${{ secrets.AIFT_WEB_READ_TOKEN }}
          path: aift-web
          sparse-checkout: |
            src/components/catalyst
            src/hooks/useSidebarState.ts
          sparse-checkout-cone-mode: false

      - name: Compare catalyst + hook deps
        run: |
          set -e
          SRC_CAT="aift-web/src/components/catalyst"
          DST_CAT="aift-help/src/components/catalyst"
          SRC_HOOK="aift-web/src/hooks/useSidebarState.ts"
          DST_HOOK="aift-help/src/hooks/useSidebarState.ts"

          if [ ! -d "$SRC_CAT" ]; then
            echo "::error::aift-web checkout missing $SRC_CAT — token may lack access or repo layout changed"
            exit 1
          fi
          if [ ! -d "$DST_CAT" ]; then
            echo "::error::aift-help is missing $DST_CAT — Catalyst was never synced"
            exit 1
          fi
          if [ ! -f "$SRC_HOOK" ]; then
            echo "::error::aift-web checkout missing $SRC_HOOK (sparse checkout may have changed)"
            exit 1
          fi
          if [ ! -f "$DST_HOOK" ]; then
            echo "::error::aift-help is missing $DST_HOOK — sync-catalyst-to-help.sh hasn't been run with the hook-deps extension"
            exit 1
          fi

          FAIL=0
          if ! diff -rq "$SRC_CAT" "$DST_CAT" > /tmp/catalyst-diff.txt; then
            echo "::error::Catalyst component drift detected vs aift-web@main"
            echo "::group::component diff"
            cat /tmp/catalyst-diff.txt
            echo "::endgroup::"
            FAIL=1
          fi
          if ! diff -q "$SRC_HOOK" "$DST_HOOK" > /tmp/hook-diff.txt; then
            echo "::error::Catalyst hook dep drift detected vs aift-web@main"
            echo "::group::hook diff"
            cat /tmp/hook-diff.txt
            diff "$SRC_HOOK" "$DST_HOOK" || true
            echo "::endgroup::"
            FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then
            echo "✓ Catalyst components + hook deps match aift-web@main"
          else
            echo ""
            echo "Fix:"
            echo "  1. cd into your local AIFT-app workspace"
            echo "  2. Run: ./aift-ops/scripts/sync-catalyst-to-help.sh"
            echo "  3. Commit the result in aift-help and re-push"
            exit 1
          fi
