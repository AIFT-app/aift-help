site_name: AI Finance Team Help
site_description: Help center for AI Finance Team
site_url: https://help.aifinance.team

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Roles & Permissions: roles-and-permissions.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
